name: Android CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Use env indirection for conditional checks; avoids invalid `secrets.*` usage in `if` expressions.
      CODERABBIT_API_KEY: ${{ secrets.CODERABBIT_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle --no-daemon assembleDebug

      - name: Run unit tests
        run: gradle --no-daemon test

      - name: Run lint
        run: gradle --no-daemon lint

      - name: CodeRabbit key configured
        if: github.event_name == 'pull_request' && env.CODERABBIT_API_KEY != ''
        run: echo "CODERABBIT_API_KEY is available for pull request workflows."
