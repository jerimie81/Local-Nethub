name: Android CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  coderabbit-review:
    if: github.event_name == 'pull_request' && secrets.CODERABBIT_API_KEY != ''
    name: CodeRabbit Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run CodeRabbit review
        uses: coderabbitai/ai-pr-reviewer@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODERABBIT_API_KEY: ${{ secrets.CODERABBIT_API_KEY }}

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build and lint debug APK
        run: gradle --no-daemon --stacktrace assembleDebug lintDebug

      - name: Upload diagnostics for fixing build errors
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-ci-diagnostics
          path: |
            **/build/reports/**
            **/build/outputs/logs/**
            **/build/test-results/**
